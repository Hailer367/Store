name: Storage & Compute Mapper

on:
  workflow_dispatch:
    inputs:
      deep_scan:
        description: 'Run deep directory scan (slower)'
        required: false
        default: 'false'
        type: boolean
      benchmark:
        description: 'Run CPU benchmark (sysbench)'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 0 * * 0'

jobs:
  map-storage:
    runs-on: ubuntu-latest
    name: Full System Audit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq tree sysbench lscpu > /dev/null 2>&1 || true

      - name: System Overview
        run: |
          echo "=========================================="
          echo "      SYSTEM OVERVIEW"
          echo "=========================================="
          echo "Hostname:     $(hostname)"
          echo "Date:         $(date -Iseconds)"
          echo "OS:           $(lsb_release -d -s 2>/dev/null || grep PRETTY_NAME /etc/os-release | cut -d= -f2 | tr -d '\"')"
          echo "Kernel:       $(uname -r)"
          echo "Architecture: $(uname -m)"
          echo "Uptime:       $(uptime -p 2>/dev/null || uptime)"
          echo ""

      - name: CPU Information
        run: |
          echo "=========================================="
          echo "      CPU INFORMATION"
          echo "=========================================="
          echo "--- lscpu ---"
          lscpu
          echo ""
          echo "--- /proc/cpuinfo (summary) ---"
          grep -m1 'model name' /proc/cpuinfo
          grep -m1 'cpu cores' /proc/cpuinfo
          grep -m1 'siblings' /proc/cpuinfo
          grep -m1 'cache size' /proc/cpuinfo
          echo ""
          echo "--- CPU Counts ---"
          echo "Physical CPUs:  $(lscpu -p | grep -v '^#' | sort -u -t, -k1,1 | wc -l)"
          echo "Cores per CPU:  $(lscpu | grep 'Core(s) per socket' | awk -F: '{print $2}' | xargs)"
          echo "Total Threads:  $(nproc)"
          echo ""
          echo "--- Load Average ---"
          cat /proc/loadavg
          echo ""
          echo "--- CPU Scaling Governors ---"
          cat /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor 2>/dev/null | sort | uniq -c || echo "No cpufreq info"

      - name: Memory & Swap Detail
        run: |
          echo "=========================================="
          echo "      MEMORY DETAIL"
          echo "=========================================="
          echo "--- /proc/meminfo ---"
          cat /proc/meminfo | head -20
          echo ""
          echo "--- free -h ---"
          free -h
          echo ""
          echo "--- vmstat ---"
          vmstat -s | head -10
          echo ""
          echo "--- Swap ---"
          swapon --show 2>/dev/null || true
          cat /proc/swaps 2>/dev/null || true

      - name: Physical & Block Devices
        run: |
          echo "=========================================="
          echo "      BLOCK DEVICES"
          echo "=========================================="
          lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT,MODEL,ROTA,UUID || lsblk
          echo ""
          echo "--- Physical Disks ---"
          lsblk -d -o NAME,SIZE,ROTA,TYPE,MODEL,SERIAL || true

      - name: Filesystems & Mounts
        run: |
          echo "=========================================="
          echo "      FILESYSTEMS & MOUNTS"
          echo "=========================================="
          cat /proc/filesystems
          echo ""
          echo "--- Mount Points ---"
          mount | sort | column -t
          echo ""
          cat /etc/fstab 2>/dev/null || echo "No fstab"

      - name: Disk Usage
        run: |
          echo "=========================================="
          echo "      DISK USAGE"
          echo "=========================================="
          df -T | column -t
          echo ""
          echo "=========================================="
          echo "      DISK USAGE (Human Readable)"
          echo "=========================================="
          df -hT | column -t

      - name: Inode Usage
        run: |
          echo "=========================================="
          echo "      INODE USAGE"
          echo "=========================================="
          df -iT | column -t

      - name: LVM Status
        run: |
          echo "=========================================="
          echo "      LVM STATUS"
          echo "=========================================="
          sudo pvs 2>/dev/null || echo "No PVs"
          echo ""
          sudo vgs 2>/dev/null || echo "No VGs"
          echo ""
          sudo lvs 2>/dev/null || echo "No LVs"

      - name: Virtual Filesystems
        run: |
          echo "=========================================="
          echo "      VIRTUAL / TEMP FILESYSTEMS"
          echo "=========================================="
          df -hT | grep -E '(tmpfs|devtmpfs|cgroup|overlay|squashfs)' | column -t || true

      - name: Top 30 Largest Directories
        run: |
          echo "=========================================="
          echo "      TOP 30 LARGEST DIRECTORIES"
          echo "=========================================="
          sudo du -h / 2>/dev/null | sort -rh | head -30 || \
          du -h /home /usr /var /opt 2>/dev/null | sort -rh | head -30

      - name: Deep Directory Scan
        if: ${{ inputs.deep_scan == true }}
        run: |
          echo "=========================================="
          echo "      DEEP DIRECTORY ANALYSIS"
          echo "=========================================="
          for dir in / /home /usr /var /opt /tmp; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- Top 10 in $dir ---"
              sudo du -h --max-depth=1 "$dir" 2>/dev/null | sort -rh | head -10
            fi
          done

      - name: CPU Benchmark (Optional)
        if: ${{ inputs.benchmark == true }}
        run: |
          echo "=========================================="
          echo "      CPU BENCHMARK"
          echo "=========================================="
          echo "--- sysbench CPU (single thread) ---"
          sysbench cpu --cpu-max-prime=10000 --threads=1 run
          echo ""
          echo "--- sysbench CPU (all threads) ---"
          sysbench cpu --cpu-max-prime=10000 --threads=$(nproc) run

      - name: GitHub Actions Context
        run: |
          echo "=========================================="
          echo "      GITHUB ACTIONS ENVIRONMENT"
          echo "=========================================="
          echo "RUNNER_OS:           ${RUNNER_OS}"
          echo "RUNNER_ARCH:         ${RUNNER_ARCH}"
          echo "RUNNER_NAME:         ${RUNNER_NAME}"
          echo "RUNNER_TOOL_CACHE:   ${RUNNER_TOOL_CACHE}"
          echo "RUNNER_TEMP:         ${RUNNER_TEMP}"
          echo "RUNNER_WORKSPACE:    ${RUNNER_WORKSPACE}"
          echo "GITHUB_WORKSPACE:    ${GITHUB_WORKSPACE}"
          echo ""
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh "${RUNNER_TOOL_CACHE}" 2>/dev/null || true
          du -sh "${RUNNER_TEMP}" 2>/dev/null || true

      - name: Generate JSON Report
        run: |
          # Block devices via lsblk (native JSON)
          BLOCK_JSON=$(lsblk -J -b -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT,MODEL,UUID 2>/dev/null || echo '{"blockdevices":[]}')

          # Write Python script for compute info
          cat > /tmp/compute.py << 'PYEOF'
          import json, subprocess, re, os

          lscpu = subprocess.run(['lscpu'], capture_output=True, text=True).stdout
          cpu_info = {}
          for line in lscpu.strip().split('\n'):
              if ':' in line:
                  k, v = line.split(':', 1)
                  cpu_info[k.strip().lower().replace(' ', '_')] = v.strip()

          with open('/proc/cpuinfo') as f:
              proc_cpu = f.read()
          model_name = re.search(r'model name\s*:\s*(.+)', proc_cpu)
          cpu_cores = re.search(r'cpu cores\s*:\s*(\d+)', proc_cpu)
          siblings = re.search(r'siblings\s*:\s*(\d+)', proc_cpu)

          with open('/proc/loadavg') as f:
              loadavg = f.read().strip().split()

          mem = {}
          with open('/proc/meminfo') as f:
              for line in f:
                  if ':' in line:
                      k, v = line.split(':', 1)
                      mem[k.strip()] = v.strip().split()[0]

          vmstat = subprocess.run(['vmstat', '-s'], capture_output=True, text=True).stdout
          threads = os.cpu_count()

          result = {
              'cpu': {
                  'model': model_name.group(1) if model_name else None,
                  'cores': int(cpu_cores.group(1)) if cpu_cores else None,
                  'threads': threads,
                  'siblings': int(siblings.group(1)) if siblings else None,
                  'architecture': cpu_info.get('architecture'),
                  'byte_order': cpu_info.get('byte_order'),
                  'cpu_family': cpu_info.get('cpu_family'),
                  'model': cpu_info.get('model'),
                  'stepping': cpu_info.get('stepping'),
                  'cpu_mhz': cpu_info.get('cpu_mhz'),
                  'bogomips': cpu_info.get('bogomips'),
                  'virtualization': cpu_info.get('virtualization'),
                  'hypervisor_vendor': cpu_info.get('hypervisor_vendor'),
                  'virtualization_type': cpu_info.get('virtualization_type'),
                  'caches': {
                      'l1d': cpu_info.get('l1d_cache'),
                      'l1i': cpu_info.get('l1i_cache'),
                      'l2': cpu_info.get('l2_cache'),
                      'l3': cpu_info.get('l3_cache')
                  }
              },
              'load_average': {
                  '1min': float(loadavg[0]),
                  '5min': float(loadavg[1]),
                  '15min': float(loadavg[2]),
                  'running_tasks': loadavg[3].split('/')[0],
                  'total_tasks': loadavg[3].split('/')[1]
              },
              'memory': {
                  'total_kb': int(mem.get('MemTotal', 0)),
                  'free_kb': int(mem.get('MemFree', 0)),
                  'available_kb': int(mem.get('MemAvailable', 0)),
                  'buffers_kb': int(mem.get('Buffers', 0)),
                  'cached_kb': int(mem.get('Cached', 0)),
                  'swap_total_kb': int(mem.get('SwapTotal', 0)),
                  'swap_free_kb': int(mem.get('SwapFree', 0)),
                  'total_human': cpu_info.get('mem_total')
              },
              'vmstat': vmstat.strip()
          }
          print(json.dumps(result))
          PYEOF
          CPU_JSON=$(python3 /tmp/compute.py)

          # Write Python script for disks
          cat > /tmp/disks.py << 'PYEOF'
          import json, subprocess
          result = subprocess.run(['df', '-T'], capture_output=True, text=True)
          lines = result.stdout.strip().split('\n')[1:]
          disks = []
          for line in lines:
              parts = line.split()
              if len(parts) >= 7:
                  disks.append({
                      'source': parts[0],
                      'fstype': parts[1],
                      'size': parts[2],
                      'used': parts[3],
                      'avail': parts[4],
                      'pcent': parts[5],
                      'mountpoint': ' '.join(parts[6:])
                  })
          print(json.dumps(disks))
          PYEOF
          DISKS_JSON=$(python3 /tmp/disks.py)

          # Write Python script for inodes
          cat > /tmp/inodes.py << 'PYEOF'
          import json, subprocess
          result = subprocess.run(['df', '-i'], capture_output=True, text=True)
          lines = result.stdout.strip().split('\n')[1:]
          inodes = []
          for line in lines:
              parts = line.split()
              if len(parts) >= 6:
                  inodes.append({
                      'source': parts[0],
                      'itotal': parts[1],
                      'iused': parts[2],
                      'iavail': parts[3],
                      'ipcent': parts[4],
                      'mountpoint': ' '.join(parts[5:])
                  })
          print(json.dumps(inodes))
          PYEOF
          INODES_JSON=$(python3 /tmp/inodes.py)

          # Combine with jq
          jq -n \
            --arg hostname "$(hostname)" \
            --arg timestamp "$(date -Iseconds)" \
            --arg runner_os "${RUNNER_OS}" \
            --arg runner_arch "${RUNNER_ARCH}" \
            --arg runner_name "${RUNNER_NAME}" \
            --arg workspace "${GITHUB_WORKSPACE}" \
            --arg temp "${RUNNER_TEMP}" \
            --arg tool_cache "${RUNNER_TOOL_CACHE}" \
            --argjson disks "$DISKS_JSON" \
            --argjson inodes "$INODES_JSON" \
            --argjson block_devices "$BLOCK_JSON" \
            --argjson compute "$CPU_JSON" \
            '{
              meta: {
                hostname: $hostname,
                timestamp: $timestamp,
                runner: $runner_name,
                os: $runner_os,
                arch: $runner_arch
              },
              compute: $compute,
              disks: $disks,
              inodes: $inodes,
              block_devices: $block_devices,
              env: {
                workspace: $workspace,
                temp: $temp,
                tool_cache: $tool_cache
              }
            }' > storage-report.json

          # Validate and pretty-print
          jq . storage-report.json > storage-report-pretty.json
          mv storage-report-pretty.json storage-report.json
          echo "JSON generated successfully"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: system-map-report-${{ github.run_id }}
          path: storage-report.json
          retention-days: 30

      - name: Summary
        run: |
          echo "=========================================="
          echo "      SUMMARY"
          echo "=========================================="
          echo "CPU:  $(nproc) threads | $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)"
          echo "RAM:  $(free -h | grep Mem | awk '{print $2}')"
          echo "Disk: $(df -h --total | tail -1 | awk '{print $2}') total, $(df -h --total | tail -1 | awk '{print $3}') used"
          echo ""
          echo "Report saved as artifact: system-map-report-${{ github.run_id }}"
