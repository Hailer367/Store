name: Storage Mapper

on:
  workflow_dispatch:
    inputs:
      deep_scan:
        description: 'Run deep directory scan (slower)'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 0 * * 0'

jobs:
  map-storage:
    runs-on: ubuntu-latest
    name: Full Storage Audit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq tree > /dev/null 2>&1 || true

      - name: System Overview
        run: |
          echo "=========================================="
          echo "      STORAGE MAPPER REPORT"
          echo "=========================================="
          echo "Hostname:     $(hostname)"
          echo "Date:         $(date -Iseconds)"
          echo "OS:           $(lsb_release -d -s 2>/dev/null || grep PRETTY_NAME /etc/os-release | cut -d= -f2 | tr -d '\"')"
          echo "Kernel:       $(uname -r)"
          echo "Architecture: $(uname -m)"
          echo ""

      - name: Physical & Block Devices
        run: |
          echo "=========================================="
          echo "      BLOCK DEVICES"
          echo "=========================================="
          lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT,MODEL,ROTA,UUID || lsblk
          echo ""
          echo "--- Physical Disks ---"
          lsblk -d -o NAME,SIZE,ROTA,TYPE,MODEL,SERIAL || true

      - name: Filesystems & Mounts
        run: |
          echo "=========================================="
          echo "      FILESYSTEMS & MOUNTS"
          echo "=========================================="
          cat /proc/filesystems
          echo ""
          echo "--- Mount Points ---"
          mount | sort | column -t
          echo ""
          cat /etc/fstab 2>/dev/null || echo "No fstab"

      - name: Disk Usage
        run: |
          echo "=========================================="
          echo "      DISK USAGE"
          echo "=========================================="
          df -hT | column -t
          echo ""
          echo "=========================================="
          echo "      INODE USAGE"
          echo "=========================================="
          df -hiT | column -t

      - name: LVM Status
        run: |
          echo "=========================================="
          echo "      LVM STATUS"
          echo "=========================================="
          sudo pvs 2>/dev/null || echo "No PVs"
          echo ""
          sudo vgs 2>/dev/null || echo "No VGs"
          echo ""
          sudo lvs 2>/dev/null || echo "No LVs"

      - name: RAM & Swap
        run: |
          echo "=========================================="
          echo "      MEMORY & SWAP"
          echo "=========================================="
          free -h
          echo ""
          swapon --show 2>/dev/null || true

      - name: Virtual Filesystems
        run: |
          echo "=========================================="
          echo "      VIRTUAL / TEMP FILESYSTEMS"
          echo "=========================================="
          df -hT | grep -E '(tmpfs|devtmpfs|cgroup|overlay|squashfs)' | column -t || true

      - name: Top 30 Largest Directories
        run: |
          echo "=========================================="
          echo "      TOP 30 LARGEST DIRECTORIES"
          echo "=========================================="
          sudo du -h / 2>/dev/null | sort -rh | head -30 || \
          du -h /home /usr /var /opt 2>/dev/null | sort -rh | head -30

      - name: Deep Directory Scan
        if: ${{ inputs.deep_scan == true }}
        run: |
          echo "=========================================="
          echo "      DEEP DIRECTORY ANALYSIS"
          echo "=========================================="
          for dir in / /home /usr /var /opt /tmp; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- Top 10 in $dir ---"
              sudo du -h --max-depth=1 "$dir" 2>/dev/null | sort -rh | head -10
            fi
          done

      - name: GitHub Actions Context
        run: |
          echo "=========================================="
          echo "      GITHUB ACTIONS ENVIRONMENT"
          echo "=========================================="
          echo "RUNNER_OS:           ${RUNNER_OS}"
          echo "RUNNER_ARCH:         ${RUNNER_ARCH}"
          echo "RUNNER_NAME:         ${RUNNER_NAME}"
          echo "RUNNER_TOOL_CACHE:   ${RUNNER_TOOL_CACHE}"
          echo "RUNNER_TEMP:         ${RUNNER_TEMP}"
          echo "RUNNER_WORKSPACE:    ${RUNNER_WORKSPACE}"
          echo "GITHUB_WORKSPACE:    ${GITHUB_WORKSPACE}"
          echo ""
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh "${RUNNER_TOOL_CACHE}" 2>/dev/null || true
          du -sh "${RUNNER_TEMP}" 2>/dev/null || true

      - name: Generate JSON Report
        run: |
          # Use lsblk for disk info (reliable JSON output)
          BLOCK_JSON=$(lsblk -J -b -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT,MODEL,UUID 2>/dev/null || echo '{"blockdevices":[]}')
          
          # Use df with explicit --output and parse with jq -R
          DISKS_JSON=$(df --output=source,fstype,size,used,avail,pcent,target | tail -n +2 | \
            jq -R -s '
              split("\n") | map(select(length > 0)) |
              map(split(" ") | map(select(length > 0))) |
              map({
                source: .[0],
                fstype: .[1],
                size: .[2],
                used: .[3],
                avail: .[4],
                pcent: .[5],
                mountpoint: .[6:]
                  | join(" ")
                  | ltrimstr(" ")
                  | rtrimstr(" ")
              })
            ')
          
          INODES_JSON=$(df -i --output=source,itotal,iused,iavail,ipcent,target | tail -n +2 | \
            jq -R -s '
              split("\n") | map(select(length > 0)) |
              map(split(" ") | map(select(length > 0))) |
              map({
                source: .[0],
                itotal: .[1],
                iused: .[2],
                iavail: .[3],
                ipcent: .[4],
                mountpoint: .[5:]
                  | join(" ")
                  | ltrimstr(" ")
                  | rtrimstr(" ")
              })
            ')
          
          # Combine everything
          jq -n \
            --arg hostname "$(hostname)" \
            --arg timestamp "$(date -Iseconds)" \
            --arg runner_os "${RUNNER_OS}" \
            --arg runner_arch "${RUNNER_ARCH}" \
            --arg runner_name "${RUNNER_NAME}" \
            --arg workspace "${GITHUB_WORKSPACE}" \
            --arg temp "${RUNNER_TEMP}" \
            --arg tool_cache "${RUNNER_TOOL_CACHE}" \
            --argjson disks "$DISKS_JSON" \
            --argjson inodes "$INODES_JSON" \
            --argjson block_devices "$BLOCK_JSON" \
            '{
              meta: {
                hostname: $hostname,
                timestamp: $timestamp,
                runner: $runner_name,
                os: $runner_os,
                arch: $runner_arch
              },
              disks: $disks,
              inodes: $inodes,
              block_devices: $block_devices,
              env: {
                workspace: $workspace,
                temp: $temp,
                tool_cache: $tool_cache
              }
            }' > storage-report.json
          
          # Validate and pretty-print
          jq . storage-report.json > storage-report-pretty.json
          mv storage-report-pretty.json storage-report.json
          echo "JSON generated successfully"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: storage-map-report-${{ github.run_id }}
          path: storage-report.json
          retention-days: 30

      - name: Summary
        run: |
          echo "=========================================="
          echo "      SUMMARY"
          echo "=========================================="
          df -h --total | tail -1 | column -t
          echo ""
          echo "Report saved as artifact: storage-map-report-${{ github.run_id }}"
