name: Storage Mapper

on:
  workflow_dispatch:
    inputs:
      deep_scan:
        description: 'Run deep directory scan (slower)'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  map-storage:
    runs-on: ubuntu-latest  # Change to self-hosted for your own server
    name: Full Storage Audit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mapping tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tree ncdu jq > /dev/null 2>&1 || true

      - name: System Overview
        run: |
          echo "=========================================="
          echo "      STORAGE MAPPER REPORT"
          echo "=========================================="
          echo "Hostname:     $(hostname)"
          echo "Date:         $(date -Iseconds)"
          echo "OS:           $(lsb_release -d -s 2>/dev/null || cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')"
          echo "Kernel:       $(uname -r)"
          echo "Architecture: $(uname -m)"
          echo ""

      - name: Physical & Block Devices
        run: |
          echo "=========================================="
          echo "      BLOCK DEVICES"
          echo "=========================================="
          echo "--- lsblk (all) ---"
          lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT,MODEL,ROTA,UUID || lsblk
          echo ""
          echo "--- Physical Disks ---"
          lsblk -d -o NAME,SIZE,ROTA,TYPE,MODEL,SERIAL || true
          echo ""
          echo "--- Block Device Details ---"
          for dev in $(lsblk -nd -o NAME 2>/dev/null); do
            echo ">> /dev/$dev:"
            blockdev --getbsz /dev/$dev 2>/dev/null && blockdev --getsize64 /dev/$dev 2>/dev/null | awk '{print "  size_bytes:", $1}' || true
          done

      - name: Filesystems & Mounts
        run: |
          echo "=========================================="
          echo "      FILESYSTEMS & MOUNTS"
          echo "=========================================="
          echo "--- /proc/filesystems ---"
          cat /proc/filesystems
          echo ""
          echo "--- Mount Points (sorted) ---"
          mount | sort | column -t
          echo ""
          echo "--- /etc/fstab ---"
          cat /etc/fstab 2>/dev/null || echo "No fstab found"
          echo ""
          echo "--- /proc/mounts ---"
          cat /proc/mounts | column -t

      - name: Disk Usage (All Partitions)
        run: |
          echo "=========================================="
          echo "      DISK USAGE (Human Readable)"
          echo "=========================================="
          df -hT | column -t
          echo ""
          echo "=========================================="
          echo "      DISK USAGE (Exact Bytes)"
          echo "=========================================="
          df -T | column -t
          echo ""
          echo "=========================================="
          echo "      INODE USAGE"
          echo "=========================================="
          df -hiT | column -t

      - name: Logical Volume Manager (LVM)
        run: |
          echo "=========================================="
          echo "      LVM STATUS"
          echo "=========================================="
          sudo pvs 2>/dev/null || echo "No physical volumes found"
          echo ""
          sudo vgs 2>/dev/null || echo "No volume groups found"
          echo ""
          sudo lvs 2>/dev/null || echo "No logical volumes found"
          echo ""
          sudo lvdisplay 2>/dev/null || true

      - name: RAM & Swap
        run: |
          echo "=========================================="
          echo "      MEMORY & SWAP"
          echo "=========================================="
          free -h
          echo ""
          echo "--- Swap Details ---"
          swapon --show 2>/dev/null || true
          cat /proc/swaps 2>/dev/null || true

      - name: Special Mounts (tmpfs, devtmpfs, cgroup, etc.)
        run: |
          echo "=========================================="
          echo "      VIRTUAL / TEMP FILESYSTEMS"
          echo "=========================================="
          df -hT | grep -E '(tmpfs|devtmpfs|cgroup|overlay|squashfs)' | column -t
          echo ""
          echo "--- tmpfs detail ---"
          mount | grep tmpfs | sort

      - name: Directory Size Map (Top 30)
        run: |
          echo "=========================================="
          echo "      TOP 30 LARGEST DIRECTORIES"
          echo "=========================================="
          # Scan from root but suppress errors
          sudo du -h / 2>/dev/null | sort -rh | head -30 || \
          du -h /home /usr /var /opt 2>/dev/null | sort -rh | head -30

      - name: Deep Directory Scan (Optional)
        if: ${{ inputs.deep_scan == true }}
        run: |
          echo "=========================================="
          echo "      DEEP DIRECTORY ANALYSIS"
          echo "=========================================="
          # Per-directory breakdowns
          for dir in / /home /usr /var /opt /tmp; do
            if [ -d "$dir" ]; then
              echo ""
              echo "--- Top 10 in $dir ---"
              sudo du -h --max-depth=1 "$dir" 2>/dev/null | sort -rh | head -10
            fi
          done

      - name: GitHub Actions Context
        run: |
          echo "=========================================="
          echo "      GITHUB ACTIONS ENVIRONMENT"
          echo "=========================================="
          echo "RUNNER_OS:           ${RUNNER_OS}"
          echo "RUNNER_ARCH:         ${RUNNER_ARCH}"
          echo "RUNNER_NAME:         ${RUNNER_NAME}"
          echo "RUNNER_TOOL_CACHE:   ${RUNNER_TOOL_CACHE}"
          echo "RUNNER_TEMP:         ${RUNNER_TEMP}"
          echo "RUNNER_WORKSPACE:    ${RUNNER_WORKSPACE}"
          echo "GITHUB_WORKSPACE:    ${GITHUB_WORKSPACE}"
          echo ""
          echo "--- Workspace Disk Usage ---"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          echo "--- Tool Cache Disk Usage ---"
          du -sh "${RUNNER_TOOL_CACHE}" 2>/dev/null || true
          echo "--- Temp Disk Usage ---"
          du -sh "${RUNNER_TEMP}" 2>/dev/null || true

      - name: Generate JSON Report
        run: |
          cat > storage-map.json << 'EOF'
          {
            "meta": {
              "hostname": "$(hostname)",
              "timestamp": "$(date -Iseconds)",
              "runner": "${RUNNER_NAME}",
              "os": "${RUNNER_OS}",
              "arch": "${RUNNER_ARCH}"
            },
            "disks": $(df -T -x tmpfs -x devtmpfs --output=source,fstype,size,used,avail,pcent,target | jq -R -s '
              split("\n") | map(select(length > 0)) | .[1:] |
              map(split(" ") | map(select(length > 0))) |
              map({
                source: .[0],
                fstype: .[1],
                size: .[2],
                used: .[3],
                avail: .[4],
                pcent: .[5],
                mountpoint: .[6]
              })
            '),
            "inodes": $(df -i -x tmpfs -x devtmpfs --output=source,itotal,iused,iavail,ipcent,target | jq -R -s '
              split("\n") | map(select(length > 0)) | .[1:] |
              map(split(" ") | map(select(length > 0))) |
              map({
                source: .[0],
                itotal: .[1],
                iused: .[2],
                iavail: .[3],
                ipcent: .[4],
                mountpoint: .[5]
              })
            '),
            "block_devices": $(lsblk -J -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT,MODEL 2>/dev/null || echo '[]'),
            "env": {
              "workspace": "${GITHUB_WORKSPACE}",
              "temp": "${RUNNER_TEMP}",
              "tool_cache": "${RUNNER_TOOL_CACHE}"
            }
          }
          EOF
          # Replace shell command substitutions with actual values
          eval "echo \"$(cat storage-map.json)\"" > storage-report.json 2>/dev/null || true
          if command -v jq &> /dev/null && [ -f storage-report.json ]; then
            jq . storage-report.json > storage-report-pretty.json
            mv storage-report-pretty.json storage-report.json
          fi

      - name: Upload Storage Report
        uses: actions/upload-artifact@v4
        with:
          name: storage-map-report-${{ github.run_id }}
          path: |
            storage-report.json
            storage-map.json
          retention-days: 30

      - name: Summary
        run: |
          echo "=========================================="
          echo "      SUMMARY"
          echo "=========================================="
          echo "Total disk usage:"
          df -h --total | tail -1 | column -t
          echo ""
          echo "Report saved as artifact: storage-map-report-${{ github.run_id }}"
